<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominican Hair Salon QR Scanner</title>
    <script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
      :root {
        --ink: #2c2528;
        --muted: #76696e;
        --line: #eadde1;
        --paper: #fffaf7;
        --panel: #ffffff;
        --plum: #432233;
        --rose: #b76e79;
        --gold: #c28d55;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #fffaf7 0%, #f3e8e1 100%);
        display: grid;
        place-items: center;
        padding: 18px;
      }

      main {
        width: min(520px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 22px 48px rgba(67, 34, 51, 0.14);
        overflow: hidden;
      }

      header {
        padding: 24px;
        color: #fff;
        background: linear-gradient(135deg, var(--plum), var(--rose) 68%, var(--gold));
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      header p {
        color: rgba(255, 255, 255, 0.86);
      }

      section {
        padding: 18px;
      }

      video {
        width: 100%;
        min-height: 310px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #1f171b;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: var(--radius);
        padding: 11px 14px;
        color: #fff;
        background: var(--plum);
        font-weight: 800;
      }

      button.secondary {
        color: var(--plum);
        background: #fff;
        border: 1px solid var(--line);
      }

      label {
        display: block;
        margin-top: 14px;
        font-weight: 800;
      }

      input {
        width: 100%;
        margin-top: 6px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 12px;
      }

      .result {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        word-break: break-all;
      }

      canvas {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Escanear QR</h1>
        <p>Scanner externo para Dominican Hair Salon. No muestra datos privados del cliente.</p>
      </header>
      <section>
        <video id="video" playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="actions">
          <button type="button" id="startBtn">Abrir camara</button>
          <button type="button" class="secondary" id="stopBtn">Cerrar</button>
        </div>
        <label for="imageInput">O subir foto del QR</label>
        <input id="imageInput" type="file" accept="image/*" capture="environment">
        <label for="manualToken">Token manual</label>
        <input id="manualToken" placeholder="DHS|ID|TOKEN">
        <div class="actions">
          <button type="button" id="sendManualBtn">Enviar al Admin</button>
          <button type="button" class="secondary" id="copyBtn">Copiar</button>
        </div>
        <div id="status" class="result">Abre la camara o sube una foto. Si el navegador bloquea la camara, usa HTTPS.</div>
      </section>
    </main>

    <script>
      const $ = selector => document.querySelector(selector);
      const state = { stream: null, frame: null };

      $('#startBtn').addEventListener('click', startCamera);
      $('#stopBtn').addEventListener('click', stopCamera);
      $('#imageInput').addEventListener('change', scanImageFile);
      $('#sendManualBtn').addEventListener('click', () => emitToken($('#manualToken').value.trim()));
      $('#copyBtn').addEventListener('click', copyToken);

      async function startCamera() {
        stopCamera();
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus('Este navegador no entrega camara aqui. Abre esta pagina en HTTPS o sube foto del QR.');
          return;
        }
        try {
          state.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } },
            audio: false
          });
          $('#video').srcObject = state.stream;
          await $('#video').play();
          setStatus('Camara activa. Apunta al QR.');
          scanLoop();
        } catch (error) {
          setStatus('No se pudo abrir la camara. En iPhone revisa permisos del navegador y que la pagina sea HTTPS.');
        }
      }

      function scanLoop() {
        if (!state.stream) return;
        const raw = decodeVideo();
        if (raw) {
          emitToken(raw);
          stopCamera();
          return;
        }
        state.frame = requestAnimationFrame(scanLoop);
      }

      function decodeVideo() {
        const video = $('#video');
        if (!window.jsQR || !video.videoWidth || !video.videoHeight) return '';
        const canvas = $('#canvas');
        const context = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        return decodeCanvas(canvas);
      }

      async function scanImageFile(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await readFile(file);
          const image = await loadImage(dataUrl);
          const canvas = $('#canvas');
          const context = canvas.getContext('2d', { willReadFrequently: true });
          const scale = Math.min(1, 1600 / Math.max(image.naturalWidth, image.naturalHeight));
          canvas.width = Math.round(image.naturalWidth * scale);
          canvas.height = Math.round(image.naturalHeight * scale);
          context.drawImage(image, 0, 0, canvas.width, canvas.height);
          const raw = decodeCanvas(canvas);
          if (!raw) throw new Error('No se pudo leer el QR de esa foto.');
          emitToken(raw);
        } catch (error) {
          setStatus(error.message || String(error));
        } finally {
          event.target.value = '';
        }
      }

      function decodeCanvas(canvas) {
        if (!window.jsQR) return '';
        const context = canvas.getContext('2d', { willReadFrequently: true });
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
        return code && code.data ? code.data : '';
      }

      function emitToken(raw) {
        if (!raw) {
          setStatus('No hay token para enviar.');
          return;
        }
        $('#manualToken').value = raw;
        setStatus(`Token detectado: ${raw}`);
        try {
          if (window.opener) window.opener.postMessage({ type: 'DHS_QR_TOKEN', raw }, '*');
        } catch (error) {}
      }

      async function copyToken() {
        const raw = $('#manualToken').value.trim();
        if (!raw) return setStatus('No hay token para copiar.');
        try {
          await navigator.clipboard.writeText(raw);
          setStatus('Token copiado. Pegalo en Admin si no se envio automaticamente.');
        } catch (error) {
          setStatus(raw);
        }
      }

      function stopCamera() {
        if (state.frame) cancelAnimationFrame(state.frame);
        state.frame = null;
        if (state.stream) state.stream.getTracks().forEach(track => track.stop());
        state.stream = null;
        $('#video').srcObject = null;
      }

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('No se pudo leer la imagen.'));
          reader.readAsDataURL(file);
        });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error('No se pudo cargar la imagen.'));
          image.src = src;
        });
      }

      function setStatus(message) {
        $('#status').textContent = message;
      }
    </script>
  </body>
</html>
